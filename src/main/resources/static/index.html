<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>献血管理系统 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #e53935 0%, #c62828 50%, #b71c1c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .login-box {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .logo-section {
            background: linear-gradient(135deg, #e53935 0%, #d32f2f 100%);
            padding: 30px;
            text-align: center;
            color: white;
        }
        .logo-section h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        .logo-section p {
            opacity: 0.9;
            font-size: 14px;
        }
        .form-section {
            padding: 30px;
        }
        .tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 2px solid #eee;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            color: #999;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        .tab.active {
            color: #e53935;
            border-bottom-color: #e53935;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #e53935;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #e53935 0%, #d32f2f 100%);
            color: white;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #d32f2f 0%, #c62828 100%);
        }
        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }
        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .message.error {
            background: #fce4ec;
            color: #c2185b;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 10px;
            color: #e53935;
        }
        .forgot-link {
            text-align: right;
            margin-top: 10px;
        }
        .forgot-link a {
            color: #e53935;
            text-decoration: none;
            font-size: 14px;
        }
        .forgot-link a:hover {
            text-decoration: underline;
        }
        .role-tip {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }
        .role-tip strong {
            color: #e53935;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="logo-section">
                <h1>🩸 献血管理系统</h1>
                <p>Blood Donation Management System</p>
            </div>
            
            <div class="form-section">
                <div class="tabs">
                    <div class="tab active" onclick="showTab('login')">登录</div>
                    <div class="tab" onclick="showTab('register')">注册</div>
                </div>

                <div id="message" class="message"></div>

                <div id="login-form">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="login-username" placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="login-password" placeholder="请输入密码">
                    </div>
                    <button class="btn btn-primary" onclick="handleLogin()">登 录</button>
                    <div class="forgot-link">
                        <a href="#">忘记密码？</a>
                    </div>
                </div>

                <div id="register-form" style="display: none;">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="reg-username" placeholder="3-20个字符">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="reg-password" placeholder="6-30个字符">
                    </div>
                    <div class="form-group">
                        <label>真实姓名</label>
                        <input type="text" id="reg-realname" placeholder="请输入真实姓名">
                    </div>
                    <button class="btn btn-primary" onclick="handleRegister()">注 册</button>
                </div>

                <div class="role-tip">
                    <strong>测试账号：</strong><br>
                    管理员：admin / 123456<br>
                    超级管理员：superadmin / 123456<br>
                    普通用户：donor001 / 123456
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('login-form').style.display = tabName === 'login' ? 'block' : 'none';
            document.getElementById('register-form').style.display = tabName === 'register' ? 'block' : 'none';
            hideMessage();
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            msg.style.display = 'block';
        }

        function hideMessage() {
            document.getElementById('message').style.display = 'none';
        }

        async function handleLogin() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value.trim();

            if (!username || !password) {
                showMessage('请输入用户名和密码', 'error');
                return;
            }

            try {
                const response = await fetch(API_BASE + '/user/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (result.code === 200) {
                    localStorage.setItem('token', result.data.token);
                    localStorage.setItem('userId', result.data.userId);
                    localStorage.setItem('username', result.data.username);
                    localStorage.setItem('role', result.data.role);
                    
                    if (result.data.role === 'ROLE_SUPER_ADMIN' || result.data.role === 'ROLE_ADMIN') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'donor.html';
                    }
                } else {
                    showMessage(result.msg || '登录失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
                console.error(error);
            }
        }

        async function handleRegister() {
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value.trim();
            const realName = document.getElementById('reg-realname').value.trim();

            if (!username || !password || !realName) {
                showMessage('请填写完整信息', 'error');
                return;
            }

            if (username.length < 3 || username.length > 20) {
                showMessage('用户名长度必须在3-20之间', 'error');
                return;
            }

            if (password.length < 6 || password.length > 30) {
                showMessage('密码长度必须在6-30之间', 'error');
                return;
            }

            try {
                const response = await fetch(API_BASE + '/user/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, realName })
                });

                const result = await response.json();

                if (result.code === 200) {
                    showMessage('注册成功，请登录', 'success');
                    setTimeout(() => showTab('login'), 1500);
                } else {
                    showMessage(result.msg || '注册失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
                console.error(error);
            }
        }
    </script>
</body>
</html>
