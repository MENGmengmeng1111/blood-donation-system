# 服务端口配置
server:
  port: 8080
  servlet:
    context-path: /

# ==================== Spring 核心配置 ====================
spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # 数据库连接配置（改成你自己的数据库地址、账号密码）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/blood_donation?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  # Jackson日期格式化（与WebMvcConfig配合）
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    generator:
      write-bigdecimal-as-plain: true
      write-numbers-as-strings: true

  # ==================== AI 配置 ====================
ai:
  openai:
    api-key: sk-abdc5cf954c54a2caae85f44e48727fe
    base-url: https://api.deepseek.com
    model: deepseek-v4-flash

# ==================== MyBatis-Plus 配置 ====================
mybatis-plus:
  # Mapper XML文件路径
  mapper-locations: classpath:mapper/*.xml
  # 实体类包路径
  type-aliases-package: com.sdut.blood.domain.entity
  configuration:
    # 开启驼峰命名自动映射
    map-underscore-to-camel-case: true
    # 开发环境打印SQL日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键生成策略：雪花算法
      id-type: assign_id
      # 逻辑删除配置
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ==================== SpringDoc + Knife4j 配置 ====================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
knife4j:
  enable: true
  setting:
    language: zh_cn
