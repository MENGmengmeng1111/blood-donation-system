    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #e53935 0%, #c62828 50%, #b71c1c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .login-box {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .logo-section {
            background: linear-gradient(135deg, #e53935 0%, #d32f2f 100%);
            padding: 30px;
            text-align: center;
            color: white;
        }
        .logo-section h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        .logo-section p {
            opacity: 0.9;
            font-size: 14px;
        }
        .form-section {
            padding: 30px;
        }
        .tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 2px solid #eee;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            color: #999;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        .tab.active {
            color: #e53935;
            border-bottom-color: #e53935;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #e53935;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #e53935 0%, #d32f2f 100%);
            color: white;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #d32f2f 0%, #c62828 100%);
        }
        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }
        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .message.error {
            background: #fce4ec;
            color: #c2185b;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 10px;
            color: #e53935;
        }
        .forgot-link {
            text-align: right;
            margin-top: 10px;
        }
        .forgot-link a {
            color: #e53935;
            text-decoration: none;
            font-size: 14px;
        }
        .forgot-link a:hover {
            text-decoration: underline;
        }
        .role-tip {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }
        .role-tip strong {
            color: #e53935;
        }
        .redirect-overlay {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(183, 28, 28, 0.94);
            color: white;
        }
        .redirect-overlay.show {
            display: flex;
            animation: fadeIn 0.25s ease-out;
        }
        .redirect-card {
            width: min(420px, 100%);
            padding: 34px 28px;
            border-radius: 8px;
            text-align: center;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.24);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.22);
        }
        .redirect-card h2 {
            font-size: 26px;
            margin-bottom: 12px;
        }
        .redirect-card p {
            font-size: 17px;
            line-height: 1.7;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .redirect-card span {
            display: block;
            opacity: 0.88;
            font-size: 14px;
        }
        .activity-progress {
            position: relative;
            width: 300px;
            height: 68px;
            margin: 30px auto 0;
            color: white;
            overflow: hidden;
        }
        .activity-icon {
            display: block;
            width: 100%;
            height: 100%;
        }
        .activity-icon-fill {
            position: absolute;
            inset: 0 auto 0 0;
            width: 0;
            overflow: hidden;
        }
        .activity-icon-fill svg {
            width: 300px;
            height: 68px;
            max-width: none;
        }
        .redirect-overlay.show .activity-icon-fill {
            animation: activityReveal 2s cubic-bezier(0.45, 0, 0.55, 1) forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes activityReveal {
            from { width: 0; }
            to { width: 100%; }
        }
    </style>

.dashboard-subtitle,
.insight-card p,
.workflow-list span,
.priority-list span,
.overview-panel span,
.stat-card small,
.stock-health-meta {
    color: var(--apple-muted);
    line-height: 1.7;
}

.overview-panel {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 28px;
    padding: 22px 28px !important;
}

.overview-panel h2 {
    margin: 0 0 10px !important;
    font-size: clamp(32px, 3.5vw, 46px) !important;
    line-height: 1;
    letter-spacing: -0.06em;
}

.overview-panel p {
    margin: 0 0 4px;
    color: var(--apple-ink);
    font-size: 16px;
    font-weight: 760;
    letter-spacing: -0.03em;
}

.overview-panel span {
    display: block;
    max-width: 680px;
    font-size: 14px;
}

.dashboard-hero {
    position: relative;
    display: grid;
    grid-template-columns: minmax(320px, 0.92fr) minmax(480px, 1.08fr);
    gap: 30px;
    align-items: stretch;
    overflow: hidden;
    padding: 38px !important;
    min-height: 360px;
}

.dashboard-hero::after {
    content: "";
    position: absolute;
    right: -126px;
    top: -132px;
    width: 390px;
    height: 390px;
    border-radius: 50%;
    border: 1px solid rgba(24, 200, 216, 0.12);
    background: radial-gradient(circle, rgba(24, 200, 216, 0.16) 0, transparent 68%);
    pointer-events: none;
}

.dashboard-hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
        radial-gradient(circle at 0% 100%, rgba(255, 79, 109, 0.13), transparent 36%),
        radial-gradient(circle at 82% 20%, rgba(24, 200, 216, 0.16), transparent 36%),
        radial-gradient(circle at 68% 90%, rgba(244, 178, 79, 0.12), transparent 30%),
        linear-gradient(120deg, rgba(255, 255, 255, 0.74), transparent 46%);
    pointer-events: none;
}

.dashboard-copy {
    position: relative;
    z-index: 1;
    display: flex;
    min-height: 284px;
    flex-direction: column;
    justify-content: space-between;
}

.dashboard-copy h2 {
    max-width: 580px;
    margin-bottom: 12px !important;
    font-size: clamp(40px, 5.4vw, 72px) !important;
    line-height: 0.98;
    letter-spacing: -0.075em;
}

.dashboard-subtitle {
    max-width: 560px;
    margin: 0;
    font-size: 15.5px;
}

.dashboard-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 0;
    justify-content: flex-end;
}

.dashboard-actions .btn {
    width: auto !important;
    padding-inline: 18px !important;
}

.dashboard-actions .btn:first-child,
.donor-welcome .quick-actions .btn:first-child,
.overview-panel .dashboard-actions .btn:first-child {
    background: linear-gradient(135deg, var(--apple-coral) 0%, #ff7a59 100%) !important;
    border-color: rgba(255, 79, 109, 0.36) !important;
    box-shadow: 0 16px 32px rgba(255, 79, 109, 0.22);
}

.dashboard-hero .stats-grid {
    position: relative;
    z-index: 1;
    align-self: stretch;
}

.stats-grid {
    gap: 14px !important;
}

.dashboard-kpi-row {
    grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
    margin: 16px 0 18px;
}

.stat-card {
    position: relative;
    min-height: 118px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 15px 18px !important;
    overflow: hidden;
    border: 1px solid rgba(0, 0, 0, 0.075) !important;
    border-radius: 26px !important;
    color: var(--apple-ink) !important;
    text-align: left !important;
    background:
        radial-gradient(circle at 88% 16%, rgba(255, 59, 95, 0.08), transparent 28%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(247, 249, 252, 0.78)) !important;
    box-shadow: 0 18px 46px rgba(15, 23, 42, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.88) !important;
}

.stat-card::after {
    content: "";
    position: absolute;
    inset: auto -42px -52px auto;
    width: 150px;
    height: 150px;
    border-radius: 50%;
    opacity: 0.34;
    filter: blur(8px);
    background: radial-gradient(circle, var(--apple-coral), transparent 64%);
    pointer-events: none;
}

.stat-card::before {
    content: "";
    position: absolute;
    right: 16px;
    top: 16px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--apple-coral);
    opacity: 0.34;
}

.stat-card:nth-child(2)::before { background: var(--apple-aqua); }
.stat-card:nth-child(3)::before { background: var(--apple-gold); }
.stat-card:nth-child(4)::before { background: var(--apple-lilac); }
.stat-card:nth-child(2)::after { background: radial-gradient(circle, var(--apple-aqua), transparent 64%); }
.stat-card:nth-child(3)::after { background: radial-gradient(circle, var(--apple-gold), transparent 64%); }
.stat-card:nth-child(4)::after { background: radial-gradient(circle, var(--apple-lilac), transparent 64%); }

.stat-icon {
    display: grid;
    place-items: center;
    width: 30px;
    height: 30px;
    border: 1px solid var(--apple-border);
    border-radius: 11px;
    color: var(--apple-coral-deep);
    background: rgba(255, 255, 255, 0.78);
    font-size: 17px;
    font-weight: 760;
}

.stat-value {
    color: var(--apple-ink) !important;
    font-size: clamp(30px, 3.2vw, 40px) !important;
    font-weight: 800 !important;
    letter-spacing: -0.06em;
}

.stat-label {
    color: var(--apple-muted) !important;
    opacity: 1 !important;
    font-size: 13px !important;
    font-weight: 650;
}

.stat-card small {
    position: relative;
    z-index: 1;
    font-size: 12px;
}

.stat-card small b {
    color: var(--apple-coral-deep);
}

.compact-stats {
    grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
}

.insight-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(300px, 0.72fr);
    gap: 22px;
}

.operations-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(286px, 0.34fr);
    gap: 22px;
    margin-bottom: 18px;
}

.insight-card {
    padding: 22px;
    border: 1px solid var(--apple-border);
    border-radius: var(--apple-radius-lg);
    background:
        radial-gradient(circle at 100% 0%, rgba(22, 184, 207, 0.07), transparent 32%),
        rgba(255, 255, 255, 0.78);
    box-shadow: 0 18px 52px rgba(15, 23, 42, 0.07);
    backdrop-filter: blur(18px);
}

.insight-card h3 {
    margin: 0 0 14px;
    color: var(--apple-ink);
    font-size: 20px;
    letter-spacing: -0.04em;
}

.stock-health-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
}

.stock-health-item {
    padding: 16px;
    border: 1px solid var(--apple-border);
    border-radius: 20px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(247, 249, 252, 0.72));
}

.stock-health-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
}

.stock-health-top strong {
    color: var(--apple-ink);
    font-size: 18px;
    letter-spacing: -0.04em;
}

.stock-health-top span {
    padding: 4px 9px;
    border-radius: 999px;
    color: var(--apple-green);
    background: var(--apple-green-soft);
    font-size: 12px;
    font-weight: 760;
}

.stock-health-amount {
    margin-top: 16px;
    color: var(--apple-ink);
    font-size: clamp(22px, 2.6vw, 30px);
    font-weight: 800;
    letter-spacing: -0.06em;
}

.stock-health-meta {
    margin-top: 2px;
    font-size: 12px;
}

.health-bar {
    height: 8px;
    margin-top: 16px;
    overflow: hidden;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.08);
}

.health-bar i {
    display: block;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, var(--apple-green), #63d471);
}

.stock-health-item.is-low .stock-health-top span {
    color: var(--apple-orange);
    background: var(--apple-orange-soft);
}

.stock-health-item.is-low .health-bar i {
    background: linear-gradient(90deg, var(--apple-gold), #ffd166);
}

.stock-health-item.is-risk .stock-health-top span {
    color: var(--apple-coral-deep);
    background: var(--apple-coral-soft);
}

.stock-health-item.is-risk .health-bar i {
    background: linear-gradient(90deg, var(--apple-coral), #ff7a59);
}

.health-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-top: 18px;
    color: var(--apple-muted);
    font-size: 12px;
}

.health-legend span {
    display: inline-flex;
    align-items: center;
    gap: 7px;
}

.health-legend i {
    width: 8px;
    height: 8px;
    border-radius: 50%;
}

.signal-red { background: var(--apple-coral); }
.signal-gold { background: var(--apple-gold); }
.signal-green { background: var(--apple-green); }

.todo-list {
    display: grid;
    gap: 10px;
    padding: 0;
    margin: 0;
    list-style: none;
}

.todo-list li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    min-height: 48px;
    padding: 12px 14px;
    border: 1px solid var(--apple-border);
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.72);
}

.todo-list span {
    color: var(--apple-ink-soft);
    font-size: 13px;
    font-weight: 650;
}

.todo-list strong {
    color: var(--apple-coral-deep);
    font-size: 18px;
    letter-spacing: -0.04em;
}

.empty-state {
    grid-column: 1 / -1;
    padding: 28px;
    border: 1px dashed var(--apple-border-strong);
    border-radius: 18px;
    color: var(--apple-muted);
    text-align: center;
    background: rgba(255, 255, 255, 0.62);
}

.workflow-list,
.priority-list {
    display: grid;
    gap: 12px;
    margin: 0;
    padding: 0;
    list-style: none;
}

.workflow-list li,
.priority-list li {
    display: grid;
    grid-template-columns: 36px 1fr;
    gap: 12px;
    align-items: flex-start;
    padding: 14px;
    border: 1px solid var(--apple-border);
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.64);
}

.workflow-list strong,
.priority-list strong {
    display: block;
    margin-bottom: 2px;
    color: var(--apple-ink);
    font-size: 14px;
}

.workflow-step {
    display: grid;
    place-items: center;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    color: #ffffff;
    background: linear-gradient(135deg, var(--apple-coral), #ff7a59);
    font-size: 13px;
    font-weight: 750;
}

.priority-dot {
    width: 10px;
    height: 10px;
    margin: 8px auto 0;
    border-radius: 50%;
    background: var(--apple-aqua);
    box-shadow: 0 0 0 8px rgba(24, 200, 216, 0.11);
}

.search-bar {
    align-items: center;
    flex-wrap: wrap;
    gap: 10px !important;
    padding: 10px;
    border: 1px solid var(--apple-border);
    border-radius: 20px;
    background: rgba(245, 245, 247, 0.72);
}

.search-bar .btn,
.card > .btn {
    width: auto !important;
    padding-inline: 16px !important;
}

table {
    width: 100%;
    min-width: 760px;
    overflow: hidden;
    border-collapse: separate !important;
    border-spacing: 0 !important;
    border: 1px solid var(--apple-border);
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.62);
}

table th,
table td {
    border-bottom: 1px solid var(--apple-border) !important;
    padding: 14px 15px !important;
    color: var(--apple-ink-soft);
    font-size: 13px !important;
    vertical-align: middle;
}

table th {
    color: var(--apple-muted) !important;
    background: rgba(245, 245, 247, 0.92) !important;
    font-weight: 750 !important;
    letter-spacing: -0.01em;
}

table tbody tr {
    transition: background 0.18s ease;
}

table tbody tr:hover {
    background: rgba(0, 0, 0, 0.025);
}

table tr:last-child td {
    border-bottom: 0 !important;
}

.status-badge {
    display: inline-flex;
    align-items: center;
    min-height: 26px;
    padding: 4px 10px !important;
    border: 1px solid var(--apple-border);
    border-radius: 999px !important;
    background: var(--apple-fill) !important;
    color: var(--apple-ink) !important;
    font-size: 12px !important;
    font-weight: 700;
}

.status-active,
.status-normal,
.status-qualified,
.status-completed {
    background: var(--apple-aqua-soft) !important;
    color: var(--apple-aqua-deep) !important;
    border-color: rgba(24, 200, 216, 0.18);
}

.status-pending,
.status-near,
.status-unqualified {
    background: var(--apple-orange-soft) !important;
    color: var(--apple-orange) !important;
    border-color: rgba(244, 178, 79, 0.26);
}

.status-canceled,
.status-expired,
.status-danger {
    background: var(--apple-red-soft) !important;
    color: var(--apple-red) !important;
    border-color: rgba(180, 35, 45, 0.16);
}

.pagination {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 22px !important;
}

.pagination a {
    border: 1px solid var(--apple-border) !important;
    border-radius: 999px !important;
    background: rgba(255, 255, 255, 0.75);
    color: var(--apple-ink) !important;
}

.pagination a.active {
    background: var(--apple-black) !important;
    border-color: var(--apple-black) !important;
    color: #ffffff !important;
}

.app-shell .card > form,
.legacy-page .modal-content form {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px 18px;
}

.app-shell .card > form input[type="hidden"],
.legacy-page .modal-content form input[type="hidden"] {
    display: none;
}

.app-shell .card > form .form-group,
.legacy-page .modal-content form .form-group {
    margin-bottom: 0 !important;
}

.app-shell .card > form .form-group:has(textarea),
.app-shell .card > form .form-group:has(input[type="text"][id*="address"]),
.legacy-page .modal-content form .form-group:has(textarea) {
    grid-column: 1 / -1;
}

.app-shell .card > form .btn,
.legacy-page .modal-content form .btn {
    width: fit-content !important;
    min-width: 120px;
    margin-top: 6px !important;
}

.info-row {
    display: grid !important;
    grid-template-columns: 120px 1fr;
    gap: 12px;
    align-items: center;
    margin: 0 !important;
    padding: 13px 0;
    border-bottom: 1px solid var(--apple-border);
}

.info-row span {
    color: var(--apple-ink);
    font-weight: 620;
}

.modal {
    background: rgba(0, 0, 0, 0.36) !important;
    backdrop-filter: blur(12px);
}

.modal-content {
    width: min(560px, calc(100% - 32px)) !important;
    max-height: min(820px, calc(100vh - 48px));
    overflow: auto;
}

.modal-content .close {
    display: grid;
    place-items: center;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    color: var(--apple-muted);
    background: var(--apple-fill);
    font-size: 22px !important;
}

.donor-welcome .dashboard-copy {
    min-height: 236px;
}

.donor-welcome .quick-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 24px;
}

.table-card {
    overflow-x: auto;
}

.ai-card {
    padding: 18px !important;
}

.ai-chat-active,
.ai-chat-active body {
    height: 100%;
    overflow: hidden !important;
}

.donor-page.ai-chat-active {
    height: 100vh;
}

.donor-page.ai-chat-active .header {
    position: fixed;
    inset: 0 0 auto 0;
    z-index: 90;
}

.donor-page.ai-chat-active .main-content {
    height: calc(100vh - var(--ai-header-height));
    margin-top: var(--ai-header-height) !important;
    padding: 14px 28px 18px !important;
    overflow: hidden;
}

.donor-page.ai-chat-active #ai-chat {
    height: 100%;
    min-height: 0;
    overflow: hidden;
}

.donor-page.ai-chat-active #ai-card {
    height: 100%;
    margin-bottom: 0 !important;
    padding: 0 !important;
    overflow: hidden;
}

.donor-page.ai-chat-active .ai-workspace {
    height: 100%;
    min-height: 0 !important;
}

.donor-page.ai-chat-active .ai-history-sidebar {
    display: flex;
    min-height: 0;
    flex-direction: column;
}

.donor-page.ai-chat-active .ai-history-list {
    flex: 1;
    max-height: none !important;
    min-height: 0;
    overflow-y: auto;
}

.donor-page.ai-chat-active .ai-chat-shell {
    height: 100%;
    min-height: 0 !important;
    overflow: hidden;
}

.donor-page.ai-chat-active .chat-box {
    flex: 1 1 auto;
    min-height: 0 !important;
    max-height: none !important;
    overflow-y: auto;
}

.donor-page.ai-chat-active .chat-footer,
.donor-page.ai-chat-active .ai-chat-header {
    flex: 0 0 auto;
}

.app-shell .ai-workspace {
    border-radius: 24px;
    overflow: hidden;
}

.app-shell .ai-history-sidebar,
.app-shell .ai-chat-shell {
    border-color: var(--apple-border) !important;
}

.app-shell .chat-bubble {
    border-radius: 18px !important;
}

body.legacy-page {
    min-height: 100vh;
}

.legacy-page .header {
    padding: 34px 24px 18px !important;
    color: var(--apple-ink) !important;
    text-align: center;
    background: transparent !important;
    box-shadow: none !important;
}

.legacy-page .header h1 {
    color: var(--apple-ink) !important;
    font-size: clamp(32px, 5vw, 52px) !important;
    font-weight: 780 !important;
    letter-spacing: -0.07em;
}

.legacy-page .nav {
    position: sticky;
    top: 16px;
    z-index: 30;
    display: flex !important;
    justify-content: center;
    flex-wrap: wrap;
    width: fit-content;
    max-width: calc(100% - 28px);
    margin: 0 auto 24px !important;
    padding: 7px !important;
    border: 1px solid rgba(255, 255, 255, 0.72);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.72) !important;
    box-shadow: var(--apple-shadow-sm);
    backdrop-filter: blur(22px) saturate(150%);
}

.legacy-page .nav a {
    padding: 9px 14px !important;
    border-radius: 999px;
    color: var(--apple-muted) !important;
    font-weight: 650;
}

.legacy-page .nav a:hover {
    color: var(--apple-ink) !important;
    background: rgba(0, 0, 0, 0.06) !important;
}

.legacy-page .nav a.active {
    color: #ffffff !important;
    background: linear-gradient(135deg, var(--apple-coral), var(--apple-aqua)) !important;
    box-shadow: 0 12px 28px rgba(24, 200, 216, 0.18), 0 10px 24px rgba(255, 79, 109, 0.14);
}

.legacy-page .container {
    width: min(1180px, calc(100% - 36px)) !important;
    max-width: 1180px !important;
    margin: 0 auto !important;
    padding: 0 0 54px !important;
}

.legacy-page .stats-grid {
    margin: 20px 0 !important;
}

.legacy-page .card > h2:first-child {
    font-size: clamp(28px, 4vw, 46px) !important;
}

@media (max-width: 1120px) {
    .dashboard-hero,
    .insight-grid,
    .operations-grid {
        grid-template-columns: 1fr;
    }

    .compact-stats,
    .dashboard-kpi-row,
    .stock-health-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
    }
}

    body.login-page {
        padding: 16px;
    }

    .login-page .login-box {
        grid-template-columns: 1fr;
        min-height: auto;
        border-radius: 28px !important;
    }

    .login-page .logo-section {
        min-height: 260px;
        padding: 34px !important;
    }

    .login-page .logo-section h1 {
        white-space: normal;
    }

    .login-page .form-section {
        padding: 30px !important;
    }

    .app-shell .header {
        grid-template-columns: 1fr;
        align-items: flex-start;
        gap: 12px;
    }

    .global-search {
        width: 100%;
        justify-self: stretch;
    }

    .app-shell .sidebar {
        position: static;
        width: auto !important;
        margin: 18px;
        max-height: none;
        border-radius: 24px;
        display: flex;
        gap: 8px;
        overflow-x: auto;
    }

    .app-shell .sidebar::before {
        display: none;
    }

    .app-shell .sidebar > div,
    .app-shell .sidebar .sub-menu {
        display: contents;
    }

    .app-shell .sidebar a {
        flex: 0 0 auto;
        white-space: nowrap;
        margin: 0 !important;
        padding: 10px 14px !important;
    }

    .app-shell .main-content {
        margin-left: 0 !important;
        padding: 0 18px 36px !important;
    }

    .app-shell .card,
    .legacy-page .card {
        padding: 20px !important;
        border-radius: 24px !important;
    }

    .dashboard-hero {
        padding: 24px !important;
    }

    .overview-panel {
        align-items: flex-start;
        flex-direction: column;
        padding: 24px !important;
    }

    .overview-panel .dashboard-actions {
        justify-content: flex-start;
    }

    .dashboard-copy h2 {
        font-size: 42px !important;
    }

    .app-shell .card > form,
    .legacy-page .modal-content form {
        grid-template-columns: 1fr;
    }

    .compact-stats,
    .dashboard-kpi-row,
    .stock-health-grid,
    .stats-grid {
        grid-template-columns: 1fr !important;
    }

    .legacy-page .nav {
        border-radius: 26px;
    }

    .donor-page.ai-chat-active .sidebar {
        display: none !important;
    }

    .donor-page.ai-chat-active .main-content {
        height: calc(100vh - var(--ai-header-height));
        margin-top: var(--ai-header-height) !important;
        padding: 10px 12px 12px !important;
    }

    .donor-page.ai-chat-active #ai-card {
        border-radius: 24px !important;
    }

    .donor-page.ai-chat-active .ai-workspace,
    .donor-page.ai-chat-active #ai-card.history-collapsed .ai-workspace {
        grid-template-columns: minmax(0, 1fr) !important;
    }

    .donor-page.ai-chat-active .ai-history-sidebar {
        display: none !important;
    }

    .donor-page.ai-chat-active .ai-chat-header {

        padding: 14px;

</style>
</head>
<body class="login-page">
    <div class="container">
        <div class="login-box">
            <div class="logo-section">
                <h1>🩸 献血管理系统</h1>
                <p>Blood Donation Management System</p>
            </div>
            
            <div class="form-section">
                <div class="tabs">
                    <div class="tab active" data-tab="login" onclick="showTab('login')">登录</div>
                    <div class="tab" data-tab="register" onclick="showTab('register')">注册</div>
                </div>

                <div id="message" class="message"></div>

                <div id="login-form">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="login-username" placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="login-password" placeholder="请输入密码">
                    </div>
                    <button class="btn btn-primary" onclick="handleLogin()">登 录</button>
                    <div class="forgot-link">
                        <a href="#">忘记密码？</a>
                    </div>
                </div>

                <div id="register-form" style="display: none;">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="reg-username" placeholder="3-20个字符">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="reg-password" placeholder="6-30个字符">
                    </div>
                    <div class="form-group">
                        <label>真实姓名</label>
                        <input type="text" id="reg-realname" placeholder="请输入真实姓名">
                    </div>
                    <button class="btn btn-primary" onclick="handleRegister()">注 册</button>
                </div>

                <div class="role-tip">
                    <strong>测试账号：</strong><br>
                    管理员：admin / 123456<br>
                    超级管理员：superadmin / 123456<br>
                    普通用户：donor001 / 123456
                </div>
            </div>
        </div>
    </div>

    <div id="redirect-overlay" class="redirect-overlay" aria-hidden="true">
        <div class="redirect-card">
            <h2 id="redirect-title">注册成功</h2>
            <p>热血汇聚成光，点滴守护生命</p>
            <span>感谢你加入无偿献血公益行动，正在进入主页...</span>
            <div class="activity-progress" aria-label="正在跳转">
                <div class="activity-icon-fill">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="activity-icon" viewBox="0.5 2 15 12" aria-hidden="true">
                        <path fill-rule="evenodd" d="M6 2a.5.5 0 0 1 .47.33L10 12.036l1.53-4.208A.5.5 0 0 1 12 7.5h3.5a.5.5 0 0 1 0 1h-3.15l-1.88 5.17a.5.5 0 0 1-.94 0L6 3.964 4.47 8.171A.5.5 0 0 1 4 8.5H.5a.5.5 0 0 1 0-1h3.15l1.88-5.17A.5.5 0 0 1 6 2"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        const REGISTER_REDIRECT_DELAY = 2000;

        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const activeTab = document.querySelector(`.tab[data-tab="${tabName}"]`);
            if (activeTab) {
                activeTab.classList.add('active');
            }
            
            document.getElementById('login-form').style.display = tabName === 'login' ? 'block' : 'none';
            document.getElementById('register-form').style.display = tabName === 'register' ? 'block' : 'none';
            hideMessage();
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            msg.style.display = 'block';
        }

        function hideMessage() {
            document.getElementById('message').style.display = 'none';
        }

        function showRedirectTransition(targetUrl, title) {
            const overlay = document.getElementById('redirect-overlay');
            document.getElementById('redirect-title').textContent = title;
            overlay.classList.remove('show');
            void overlay.offsetWidth;
            overlay.classList.add('show');
            overlay.setAttribute('aria-hidden', 'false');
            setTimeout(() => {
                window.location.href = targetUrl;
            }, REGISTER_REDIRECT_DELAY);
        }

        function saveSessionAndRedirect(user, transitionTitle) {
            localStorage.setItem('token', user.token);
            localStorage.setItem('userId', user.userId);
            localStorage.setItem('username', user.username);
            localStorage.setItem('role', user.role);

            let targetUrl;
            if (user.role === 'ROLE_SUPER_ADMIN' || user.role === 'ROLE_ADMIN') {
                targetUrl = 'admin.html';
            } else {
                targetUrl = 'donor.html';
            }

            if (transitionTitle) {
                showRedirectTransition(targetUrl, transitionTitle);
            } else {
                window.location.href = targetUrl;
            }
        }

        async function handleLogin() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value.trim();

            if (!username || !password) {
                showMessage('请输入用户名和密码', 'error');
                return;
            }

            try {
                const response = await fetch(API_BASE + '/user/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (result.code === 200) {
                    saveSessionAndRedirect(result.data, '登录成功');
                } else {
                    showMessage(result.msg || '登录失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
                console.error(error);
            }
        }

        async function handleRegister() {
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value.trim();
            const realName = document.getElementById('reg-realname').value.trim();

            if (!username || !password || !realName) {
                showMessage('请填写完整信息', 'error');
                return;
            }

            if (username.length < 3 || username.length > 20) {
                showMessage('用户名长度必须在3-20之间', 'error');
                return;
            }

            if (password.length < 6 || password.length > 30) {
                showMessage('密码长度必须在6-30之间', 'error');
                return;
            }

            try {
                const response = await fetch(API_BASE + '/user/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, realName })
                });

                const result = await response.json();

                if (result.code === 200) {
                    showMessage('注册成功，正在进入主页...', 'success');

                    const loginResponse = await fetch(API_BASE + '/user/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const loginResult = await loginResponse.json();

                    if (loginResult.code === 200) {
                        saveSessionAndRedirect(loginResult.data, '注册成功');
                    } else {
                        showMessage(loginResult.msg || '注册成功，请登录', 'success');
                        setTimeout(() => showTab('login'), 1500);
                    }
                } else {
                    showMessage(result.msg || '注册失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
                console.error(error);
            }
        }
    </script>
</body>
</html>
